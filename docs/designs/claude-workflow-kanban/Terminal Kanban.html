<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Agent Board — Terminal Kanban</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080a;
    --bg-1: #0c0d10;
    --bg-2: #121418;
    --bg-3: #171a1f;
    --line: #23262d;
    --line-2: #2d3139;
    --text: #e6e9ef;
    --text-2: #a5acba;
    --text-3: #6b7280;
    --green: #6ee77f;
    --green-dim: #3fa64f;
    --amber: #ffb547;
    --red: #ff6b6b;
    --blue: #7aa2ff;
    --purple: #c39bff;
    --cursor: #6ee77f;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', system-ui, -apple-system, Segoe UI, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    overflow: hidden;
  }
  button { font-family: inherit; color: inherit; }
  #root { height: 100vh; }

  /* Top bar */
  .topbar {
    height: 44px;
    display: flex; align-items: center;
    padding: 0 14px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--line);
    gap: 14px;
    position: relative;
    z-index: 30;
  }
  .topbar .brand {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 12.5px;
    letter-spacing: 0.02em;
  }
  .brand .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
  .topbar .path {
    font-family: var(--mono);
    color: var(--text-3);
    font-size: 12px;
  }
  .topbar .path b { color: var(--text-2); font-weight: 500; }
  .topbar .spacer { flex: 1; }
  .topbar .chip {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 9px;
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--text-2);
    background: var(--bg-2);
    display: flex; align-items: center; gap: 6px;
  }
  .topbar .chip kbd {
    font: inherit;
    color: var(--text-3);
    padding: 0 4px;
    border: 1px solid var(--line-2);
    border-radius: 3px;
    background: var(--bg-1);
  }
  .topbar .btn {
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text-2);
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 5px 11px;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  .topbar .btn:hover { color: var(--text); border-color: var(--line-2); background: var(--bg-3); }
  .topbar .btn.primary {
    background: rgba(110, 231, 127, 0.08);
    border-color: rgba(110, 231, 127, 0.3);
    color: var(--green);
  }
  .topbar .btn.primary:hover { background: rgba(110, 231, 127, 0.14); }

  /* Board */
  .board {
    position: absolute;
    inset: 44px 0 0 0;
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 14px;
    gap: 12px;
    background:
      radial-gradient(1200px 400px at 20% 0%, rgba(110,231,127,0.04), transparent 60%),
      radial-gradient(900px 400px at 80% 100%, rgba(122,162,255,0.04), transparent 60%),
      var(--bg);
  }
  .board::-webkit-scrollbar { height: 10px; }
  .board::-webkit-scrollbar-track { background: transparent; }
  .board::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }

  /* Column */
  .col {
    flex: 0 0 auto;
    width: 360px;
    display: flex; flex-direction: column;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    max-height: 100%;
  }
  .col.wide { width: 420px; }
  .col.narrow { width: 300px; }
  .col-head {
    display: flex; align-items: center;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    gap: 8px;
    background: var(--bg-2);
  }
  .col-head .pill {
    width: 6px; height: 6px; border-radius: 50%;
  }
  .col-head .title {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
  }
  .col-head .count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
    padding: 1px 6px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg-1);
  }
  .col-head .flex { flex: 1; }
  .col-head .icon-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-3);
    width: 22px; height: 22px;
    border-radius: 4px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    padding: 0;
  }
  .col-head .icon-btn:hover { color: var(--text); background: var(--bg-3); border-color: var(--line); }

  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex; flex-direction: column;
    gap: 10px;
    min-height: 0;
  }
  .col-body::-webkit-scrollbar { width: 8px; }
  .col-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }
  .col-body.drop-active {
    background: rgba(110,231,127,0.03);
    box-shadow: inset 0 0 0 1px rgba(110,231,127,0.25);
  }
  .col-body.grid-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-content: start;
  }

  .col-foot {
    border-top: 1px solid var(--line);
    padding: 8px;
    background: var(--bg-1);
  }
  .add-agent {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--line-2);
    color: var(--text-3);
    border-radius: 5px;
    padding: 8px;
    font-family: var(--mono);
    font-size: 11.5px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-agent:hover { color: var(--green); border-color: rgba(110,231,127,0.4); background: rgba(110,231,127,0.04); }

  /* Card */
  .card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 7px;
    overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
    transition: border-color 120ms, box-shadow 120ms, transform 120ms;
  }
  .card.selected {
    border-color: rgba(110,231,127,0.5);
    box-shadow: 0 0 0 1px rgba(110,231,127,0.3), 0 6px 22px rgba(0,0,0,0.45);
  }
  .card.dragging {
    opacity: 0.45;
  }
  .card.focused {
    border-color: var(--line-2);
  }
  .card-head {
    display: flex; align-items: center;
    padding: 6px 8px 6px 10px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-3);
    gap: 8px;
    cursor: grab;
    user-select: none;
    min-height: 30px;
  }
  .card-head:active { cursor: grabbing; }
  .card-head .lights {
    display: flex; gap: 5px;
  }
  .card-head .lights i {
    width: 10px; height: 10px; border-radius: 50%;
    display: block;
    border: 1px solid rgba(0,0,0,0.3);
  }
  .card-head .lights .r { background: #ff5f56; }
  .card-head .lights .y { background: #ffbd2e; }
  .card-head .lights .g { background: #27c93f; }
  .card-head .title {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--text);
    font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1;
  }
  .card-head .title input {
    background: transparent;
    border: none;
    color: inherit;
    font: inherit;
    width: 100%;
    padding: 0;
    outline: none;
  }
  .card-head .status {
    font-family: var(--mono);
    font-size: 9.5px;
    padding: 1px 6px;
    border-radius: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .status.idle { background: rgba(107,114,128,0.15); color: var(--text-3); border: 1px solid var(--line-2); }
  .status.run  { background: rgba(255,181,71,0.12); color: var(--amber); border: 1px solid rgba(255,181,71,0.3); }
  .status.ok   { background: rgba(110,231,127,0.12); color: var(--green); border: 1px solid rgba(110,231,127,0.3); }
  .status.err  { background: rgba(255,107,107,0.12); color: var(--red); border: 1px solid rgba(255,107,107,0.3); }
  .card-head .menu-btn {
    background: transparent;
    border: none;
    color: var(--text-3);
    padding: 2px 4px;
    cursor: pointer;
    border-radius: 3px;
  }
  .card-head .menu-btn:hover { color: var(--text); background: var(--bg-2); }
  .card-desc {
    font-family: var(--sans);
    font-size: 11.5px;
    color: var(--text-2);
    padding: 8px 10px 4px 10px;
    line-height: 1.4;
  }
  .card-desc input {
    background: transparent;
    border: none;
    color: inherit;
    font: inherit;
    width: 100%;
    padding: 0;
    outline: none;
  }

  /* Terminal area */
  .term {
    background: #000000;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
    color: #d7dae0;
    display: flex; flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .term-output {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px 4px 10px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .term-output::-webkit-scrollbar { width: 6px; }
  .term-output::-webkit-scrollbar-thumb { background: #23262d; }
  .term-line { display: block; }
  .term-line.cmd { color: #e6e9ef; }
  .term-line.cmd .prompt { color: var(--green); }
  .term-line.cmd .cwd { color: var(--blue); }
  .term-line.cmd .tick { color: var(--text-3); }
  .term-line.out-err { color: var(--red); }
  .term-line.out-warn { color: var(--amber); }
  .term-line.out-ok { color: var(--green); }
  .term-line.out-dim { color: var(--text-3); }
  .term-line .c-green { color: var(--green); }
  .term-line .c-blue { color: var(--blue); }
  .term-line .c-purple { color: var(--purple); }
  .term-line .c-amber { color: var(--amber); }
  .term-line .c-red { color: var(--red); }
  .term-line .c-dim { color: var(--text-3); }
  .term-line .c-b { font-weight: 700; }

  .term-input-row {
    display: flex; align-items: center;
    padding: 4px 10px 8px 10px;
    gap: 6px;
  }
  .term-input-row .prompt { color: var(--green); white-space: nowrap; }
  .term-input-row .cwd { color: var(--blue); white-space: nowrap; }
  .term-input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e6e9ef;
    font: inherit;
    caret-color: var(--cursor);
    padding: 0;
  }

  /* Resize handle */
  .resize {
    position: absolute;
    right: 2px; bottom: 2px;
    width: 14px; height: 14px;
    cursor: nwse-resize;
    color: var(--text-3);
    opacity: 0.6;
    z-index: 2;
  }
  .resize:hover { opacity: 1; color: var(--green); }

  /* Drop indicator */
  .drop-indicator {
    height: 3px;
    background: var(--green);
    border-radius: 3px;
    box-shadow: 0 0 8px rgba(110,231,127,0.5);
    margin: -2px 0;
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed;
    right: 14px; bottom: 14px;
    width: 260px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    z-index: 100;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    font-family: var(--mono);
    font-size: 11.5px;
  }
  .tweaks h4 {
    margin: 0 0 10px 0;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-3);
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .tweaks h4::before {
    content: "";
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--green);
  }
  .tweaks .row { margin-bottom: 10px; }
  .tweaks .row:last-child { margin-bottom: 0; }
  .tweaks .label {
    font-size: 10.5px;
    color: var(--text-3);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .tweaks .seg {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 2px;
    gap: 2px;
  }
  .tweaks .seg button {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-3);
    font: inherit;
    padding: 5px 6px;
    border-radius: 3px;
    cursor: pointer;
  }
  .tweaks .seg button.active {
    background: var(--bg-3);
    color: var(--green);
  }
  .tweaks .toggle {
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
  }
  .tweaks .toggle input { margin: 0; accent-color: var(--green); }

  /* Selection marquee */
  .marquee {
    position: fixed;
    border: 1px solid rgba(110,231,127,0.6);
    background: rgba(110,231,127,0.07);
    z-index: 5;
    pointer-events: none;
  }

  /* Context menu / mini popovers */
  .ctx {
    position: fixed;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 4px;
    min-width: 150px;
    z-index: 200;
    box-shadow: 0 12px 32px rgba(0,0,0,0.6);
    font-family: var(--mono);
    font-size: 11.5px;
  }
  .ctx button {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-2);
    text-align: left;
    padding: 6px 10px;
    border-radius: 3px;
    cursor: pointer;
    font: inherit;
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .ctx button:hover { background: var(--bg-3); color: var(--text); }
  .ctx button.danger:hover { color: var(--red); }
  .ctx .sep { height: 1px; background: var(--line); margin: 4px 0; }
  .ctx .hint { color: var(--text-3); font-size: 10px; }

  /* Focus overlay */
  .focus-veil {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(3px);
    z-index: 150;
    display: flex; align-items: center; justify-content: center;
  }
  .focus-box {
    width: min(900px, 90vw);
    height: min(600px, 85vh);
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Icons are unicode / inline svg */
  .ic { width: 14px; height: 14px; display: inline-block; }

  /* Blinking cursor when not focused */
  .fake-cursor {
    display: inline-block;
    width: 7px; height: 14px;
    background: var(--green);
    vertical-align: text-bottom;
    animation: blink 1s steps(2) infinite;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Stack layout rows for compact variant */
  .card.compact .card-desc { display: none; }
  .card.compact .term-output { max-height: 90px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="terminal.jsx"></script>
<script type="text/babel" src="card.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
